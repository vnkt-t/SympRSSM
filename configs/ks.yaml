# Kuramoto-Sivashinsky experiment configuration
env:
  name: ks
  N: 64
  L: 22.0
  nu: 1.0
  dt: 0.5
  n_actuators: 4
  episode_length: 200

model:
  q_dim: 128
  p_dim: 128
  stoch_dim: 32
  stoch_classes: 32
  hamiltonian_hidden: 256
  integrator: yoshida4     # {yoshida4, leapfrog, rk4}
  integrator_dt: 1.0
  noether_projection: true
  noether_type: linear     # mean-zero (momentum conservation)

training:
  seed: 0
  n_seeds: 5
  total_env_steps: 500_000
  batch_size: 16
  seq_length: 50
  imagination_horizon: 15
  lr_world: 1.0e-4
  lr_actor: 3.0e-5
  lr_critic: 3.0e-5
  grad_clip: 100.0
  kl_balance: 0.8
  precision: float32

eval:
  rollout_length: 1000
  n_eval_episodes: 20
  ood_nu: [0.5, 0.7, 1.0, 1.3, 1.5]
